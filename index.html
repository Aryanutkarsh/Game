<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Pop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-950 text-slate-200 font-sans h-screen flex flex-col overflow-hidden selection:bg-emerald-500 selection:text-white">

    <!-- Header -->
    <header class="h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6 shrink-0 z-20 shadow-md">
        <div class="flex items-center gap-3">
            <img src="assets/animation/Chicken.svg" alt="Logo" class="w-8 h-8">
            <div>
                <h1 class="font-black text-xl tracking-wider text-white italic">CHICKEN <span class="text-yellow-400">POP</span></h1>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="bg-slate-800 rounded-lg p-1 flex items-center border border-slate-700 shadow-inner">
                <div class="bg-slate-900 rounded px-4 py-1.5 flex items-center gap-2">
                    <span class="text-emerald-400 font-bold">$</span>
                    <span id="balance-display" class="font-mono font-bold text-lg text-white">1000.00</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Game Area -->
    <main class="flex-1 relative flex flex-col bg-slate-900 overflow-hidden">
        
        <!-- Status Overlay -->
        <div id="status-overlay" class="absolute inset-0 z-30 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-300">
            <div id="status-message" class="text-5xl font-black italic tracking-widest drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)]"></div>
        </div>

        <!-- The Road / Play Area -->
        <div class="flex-1 w-full max-w-7xl mx-auto p-4 md:p-8 flex items-center justify-center relative">
            
            <!-- Road Container -->
            <div class="w-full h-72 sm:h-96 bg-slate-800 rounded-xl relative flex border-b-[12px] border-slate-950 shadow-[inset_0_20px_50px_rgba(0,0,0,0.5)] overflow-hidden">
                
                <!-- Start Zone (Cave) -->
                <div class="w-16 sm:w-24 h-full relative flex items-end justify-center pb-6 shrink-0 bg-slate-800 border-r border-slate-700 z-10">
                    <!-- Cave Entrance -->
                    <div class="w-12 sm:w-16 h-24 sm:h-32 bg-slate-950 rounded-t-full absolute bottom-0 shadow-[inset_0_10px_20px_rgba(0,0,0,0.8)] border border-slate-800 border-b-0"></div>
                </div>

                <!-- Lanes Container (Injected by JS) -->
                <div id="lanes-container" class="flex-1 flex h-full relative">
                    <!-- Lanes go here -->
                </div>

                <div id="explosion-effect" class="fixed inset-0 z-50 pointer-events-none flex items-center justify-center opacity-0 transition-opacity duration-300">
                    <dotlottie-player src="assets/animation/Fire%20-%20Feu%20-%20Fuego.lottie" background="transparent" speed="1" loop autoplay class="w-full h-full object-cover mix-blend-screen opacity-90 drop-shadow-[0_0_20px_rgba(255,100,0,0.8)]"></dotlottie-player>
                </div>

                <!-- The Chicken -->
                <div id="chicken-wrapper" class="absolute bottom-6 sm:bottom-10 z-20" style="left: 0; width: 3rem; text-align: center;">
                    <div id="chicken-sprite" class="w-12 h-12 sm:w-16 sm:h-16 drop-shadow-xl inline-block" style="filter: drop-shadow(0px 10px 5px rgba(0,0,0,0.5)); transform-origin: bottom center;">
                        <img id="chicken-img" src="assets/animation/Chicken.svg" alt="Chicken" class="w-full h-full object-contain -scale-x-100">
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Finish Screen -->
    <div id="finish-overlay" class="fixed inset-0 z-40 hidden items-center justify-center bg-slate-950/80 backdrop-blur-md px-4">
        <div class="w-full max-w-lg rounded-3xl border border-slate-700 bg-slate-900/95 shadow-[0_30px_80px_rgba(0,0,0,0.6)] overflow-hidden">
            <div class="p-6 sm:p-8 border-b border-slate-700/80 bg-gradient-to-br from-amber-500/15 via-slate-900 to-emerald-500/10 animate-finish-glow">
                <div class="flex items-center gap-3 mb-3">
                    <img src="assets/animation/Chicken.svg" alt="Finish" class="w-10 h-10">
                    <div>
                        <p class="text-xs uppercase tracking-[0.35em] text-slate-400 font-bold">Run Complete</p>
                        <h2 class="text-3xl sm:text-4xl font-black text-white">Chicken Pop Finished</h2>
                    </div>
                </div>
                <p class="text-slate-300 text-sm sm:text-base">The chicken reached the end without getting hurt.</p>
            </div>
            <div class="p-6 sm:p-8 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="rounded-2xl bg-slate-800/80 border border-slate-700 p-4">
                        <div class="text-xs uppercase tracking-wider text-slate-400 font-bold mb-1">Final cash earned</div>
                        <div id="finish-earned" class="text-3xl font-black text-emerald-400 font-mono">$0.00</div>
                    </div>
                    <div class="rounded-2xl bg-slate-800/80 border border-slate-700 p-4">
                        <div class="text-xs uppercase tracking-wider text-slate-400 font-bold mb-1">Total balance</div>
                        <div id="finish-balance" class="text-3xl font-black text-white font-mono">$0.00</div>
                    </div>
                </div>
                <button onclick="playAgainFromFinish()" class="w-full h-14 rounded-2xl bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black text-lg transition-all shadow-[0_0_20px_rgba(16,185,129,0.3)]">
                    Play Again
                </button>
            </div>
        </div>
    </div>

    <!-- Controls Footer -->
    <footer class="bg-slate-800 border-t border-slate-700 p-4 shrink-0 z-20 shadow-[0_-10px_20px_rgba(0,0,0,0.3)]">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-4">
            
            <!-- Left: Bet Setup -->
            <div class="flex-1 glass-panel rounded-xl p-3 flex flex-col justify-between gap-2">
                <div class="flex justify-between text-xs text-slate-400 font-semibold uppercase tracking-wider px-1">
                    <span>Bet Amount</span>
                    <span id="profit-preview" class="text-emerald-400 opacity-0 transition-opacity">Win: $0.00</span>
                </div>
                
                <div class="flex bg-slate-900 rounded-lg p-1 border border-slate-700 h-12">
                    <div class="flex items-center px-3 text-slate-400 font-bold">$</div>
                    <input type="number" id="bet-input" value="10.00" min="0.10" step="0.10" class="w-full bg-transparent text-white font-mono font-bold text-lg focus:outline-none" :disabled="isPlaying">
                    <div class="flex gap-1 pr-1 py-1">
                        <button onclick="adjustBet('half')" class="px-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded font-semibold text-xs transition-colors disabled:opacity-50">/2</button>
                        <button onclick="adjustBet('double')" class="px-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded font-semibold text-xs transition-colors disabled:opacity-50">x2</button>
                    </div>
                </div>
            </div>

            <!-- Middle: Difficulty -->
            <div class="flex-1 glass-panel rounded-xl p-3 flex flex-col justify-between gap-2">
                <div class="flex justify-between text-xs text-slate-400 font-semibold uppercase tracking-wider px-1">
                    <span>Difficulty</span>
                    <span id="risk-indicator" class="text-yellow-400">Low Risk</span>
                </div>
                <div class="flex bg-slate-900 rounded-lg p-1 border border-slate-700 h-12 relative">
                    <!-- Active background slider -->
                    <div id="difficulty-slider" class="absolute top-1 bottom-1 left-1 bg-slate-700 rounded-md transition-all duration-300 ease-in-out w-[calc(25%-0.5rem)]"></div>
                    
                    <button onclick="setDifficulty('easy', 0)" class="diff-btn relative z-10 flex-1 text-sm font-bold text-white transition-colors duration-200">Easy</button>
                    <button onclick="setDifficulty('medium', 1)" class="diff-btn relative z-10 flex-1 text-sm font-bold text-slate-400 hover:text-white transition-colors duration-200">Medium</button>
                    <button onclick="setDifficulty('hard', 2)" class="diff-btn relative z-10 flex-1 text-sm font-bold text-slate-400 hover:text-white transition-colors duration-200">Hard</button>
                    <button onclick="setDifficulty('hardcore', 3)" class="diff-btn relative z-10 flex-1 text-sm font-bold text-slate-400 hover:text-white transition-colors duration-200">Hardcore</button>
                </div>
            </div>

            <!-- Right: Action Area -->
            <div class="flex-1 flex gap-2 h-[88px]"> <!-- Fixed height to match sibling panels -->
                <!-- Idle State: Play Button -->
                <button id="btn-play" onclick="startGame()" class="w-full h-full bg-emerald-500 hover:bg-emerald-400 active:bg-emerald-600 text-slate-950 font-black text-2xl rounded-xl transition-all shadow-[0_0_15px_rgba(16,185,129,0.3)] hover:shadow-[0_0_25px_rgba(16,185,129,0.5)] transform hover:-translate-y-1 active:translate-y-0">
                    PLAY
                </button>

                <!-- Playing State: Cashout & Next -->
                <div id="playing-controls" class="hidden w-full h-full flex gap-2">
                    <button id="btn-cashout" onclick="cashOut()" class="flex-1 h-full bg-amber-500 hover:bg-amber-400 active:bg-amber-600 text-slate-950 rounded-xl transition-all shadow-lg flex flex-col items-center justify-center group disabled:opacity-50 disabled:cursor-not-allowed">
                        <span class="text-xs font-bold uppercase tracking-wider opacity-80 mb-[-4px]">Cashout</span>
                        <span id="cashout-amount" class="text-xl font-black font-mono group-hover:scale-105 transition-transform">$0.00</span>
                    </button>
                    <button id="btn-next" onclick="takeStep()" class="flex-1 h-full bg-emerald-500 hover:bg-emerald-400 active:bg-emerald-600 text-slate-950 font-black text-xl rounded-xl transition-all shadow-lg flex flex-col items-center justify-center group disabled:opacity-50 disabled:cursor-not-allowed">
                        <span class="text-xs font-bold uppercase tracking-wider opacity-80 mb-[-4px]">Jump</span>
                        <span id="next-multi-display" class="text-lg font-black font-mono bg-slate-950/20 px-2 rounded group-hover:scale-105 transition-transform">1.03x</span>
                    </button>
                </div>
            </div>

        </div>
    </footer>

    <!-- Game Logic -->
    <script src="script.js"></script>
</body>
</html>
